name: Build Multi-OS Binaries

on:
  release:
    types: [published, edited, created]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: "MediaFixer-windows"
            # Windows bekommt den Ordner-Modus
            pyinstaller_args: "--onedir" 
          - os: ubuntu-latest
            artifact_name: "MediaFixer-linux"
            # Linux bleibt bei der einzelnen Datei
            pyinstaller_args: "--onefile"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        # Pfad-Trenner ermitteln (; für Win, : für Linux)
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then SEP=";"; else SEP=":"; fi
        
        TK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
        
        pyinstaller --noconsole ${{ matrix.pyinstaller_args }} --name "${{ matrix.artifact_name }}" \
        --add-data "locales${SEP}locales" \
        --add-data "audio_flags.json${SEP}." \
        --add-data "${TK_PATH}${SEP}customtkinter" \
        main.py

    # DIESER SCHRITT IST NUR FÜR WINDOWS
    - name: Zip Windows Folder
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Wir zippen den kompletten Ordner aus dem 'dist' Verzeichnis
        Compress-Archive -Path "dist/MediaFixer-windows" -DestinationPath "dist/MediaFixer-windows.zip" -Force

    # DIESER SCHRITT LÄDT DIE DATEIEN HOCH
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.os == 'windows-latest' && 'dist/MediaFixer-windows.zip' || 'dist/MediaFixer-linux' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}