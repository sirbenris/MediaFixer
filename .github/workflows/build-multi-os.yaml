name: Build Multi-OS Binaries

on:
  release:
    types: [published, edited, created]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: "MediaFixer-windows"
            pyinstaller_mode: "--onedir"
            sep: ";"
            upload_path: "dist/MediaFixer-windows.zip"
          - os: ubuntu-latest
            artifact_name: "MediaFixer-linux"
            pyinstaller_mode: "--onefile"
            sep: ":"
            upload_path: "dist/MediaFixer-linux"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller pymediainfo

    - name: Build with PyInstaller
      shell: bash
      run: |
        TK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
        
        # PyInstaller wird exakt mit dem Modus aus der Matrix gefüttert
        pyinstaller --noconsole ${{ matrix.pyinstaller_mode }} --name "${{ matrix.artifact_name }}" \
        --add-data "locales${{ matrix.sep }}locales" \
        --add-data "audio_flags.json${{ matrix.sep }}." \
        --add-data "rime.json${{ matrix.sep }}." \
        --add-data "${TK_PATH}${{ matrix.sep }}customtkinter" \
        --collect-binaries pymediainfo \
        main.py

    - name: Zip Windows Folder
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Zippt den frisch erstellten Ordner
        Compress-Archive -Path "dist/MediaFixer-windows" -DestinationPath "dist/MediaFixer-windows.zip" -Force

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        # Hier nimmt er jetzt stur den Pfad, der oben in der Matrix steht!
        files: ${{ matrix.upload_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}