name: Build Multi-OS Binaries

on:
  release:
    types: [published, edited, created]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MediaFixer-windows.exe
            separator: ";"
          - os: ubuntu-latest
            artifact_name: MediaFixer-linux
            separator: ":"

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        # Pfad zu customtkinter finden (funktioniert auf beiden OS via bash)
        TK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
        
        pyinstaller --noconsole --onefile --name "${{ matrix.artifact_name }}" \
        --add-data "locales${{ matrix.separator }}locales" \
        --add-data "audio_flags.json${{ matrix.separator }}." \
        --add-data "${TK_PATH}${{ matrix.separator }}customtkinter" \
        main.py

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}